<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>Do you love me?</title>

  <!-- Required by the prompt. The meme has its own CSS below, so it still looks correct if the CDN is unavailable. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #09090d;
      --window: #17171c;
      --chrome: #24242b;
      --chrome-line: #373741;
      --white: #f7f7f7;
      --pink: #ff38b7;
      --hot-pink: #ff149d;
      --heart: #ff4fc4;
      --frame-pad: clamp(20px, 5vw, 52px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050507;
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      cursor: default;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.045), transparent 0.35rem),
        radial-gradient(circle at 84% 12%, rgba(255, 255, 255, 0.05), transparent 0.28rem),
        radial-gradient(circle at 77% 72%, rgba(255, 255, 255, 0.035), transparent 0.3rem),
        linear-gradient(145deg, #111117 0%, #07070a 52%, #101015 100%);
    }

    button {
      font: inherit;
    }

    .desktop {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3vw, 36px);
      transition: opacity 260ms ease, transform 320ms cubic-bezier(.2, .8, .2, 1);
    }

    body.love-active .desktop {
      opacity: 0;
      transform: scale(0.97);
      pointer-events: none;
    }

    .browser-window {
      width: min(1080px, 94vw);
      height: min(690px, 82vh);
      min-height: 470px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: #050505;
      overflow: hidden;
      box-shadow:
        0 34px 100px rgba(0, 0, 0, 0.72),
        0 12px 34px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .browser-top {
      height: 76px;
      background: linear-gradient(#303039, #202026);
      border-bottom: 1px solid #0d0d10;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .traffic-row {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .tab {
      height: 28px;
      min-width: 164px;
      margin-left: 12px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      border-radius: 8px 8px 0 0;
      background: #16161b;
      color: #d8d8dd;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 0;
    }

    .address-row {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px 10px;
    }

    .nav-pill {
      width: 28px;
      height: 24px;
      display: grid;
      place-items: center;
      color: #aaaab1;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 16px;
      line-height: 1;
    }

    .address {
      flex: 1;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border-radius: 7px;
      color: #c8c8cf;
      background: #101015;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lock {
      color: #7edb8d;
      font-size: 12px;
    }

    .browser-body {
      height: calc(100% - 76px);
      display: grid;
      place-items: center;
      padding: var(--frame-pad);
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.04), transparent 20%),
        #000;
    }

    .meme-frame {
      position: relative;
      width: min(760px, 100%);
      height: min(420px, 100%);
      min-height: 300px;
      display: grid;
      place-items: center;
      border: 3px solid #fbfbfb;
      background: #000;
      overflow: hidden;
    }

    .question-ui {
      display: grid;
      justify-items: center;
      gap: 28px;
      z-index: 2;
      transform: translateY(-8px);
      user-select: none;
    }

    .question {
      margin: 0;
      color: #fff;
      font-size: clamp(38px, 7vw, 72px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.2);
    }

    .choices {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 42px;
    }

    .meme-button {
      min-width: 82px;
      height: 36px;
      padding: 4px 22px;
      border: 2px outset #ececec;
      border-radius: 3px;
      background: #e8e8e8;
      color: #050505;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset;
      cursor: pointer;
    }

    .meme-button:active {
      border-style: inset;
      transform: translateY(1px) scale(0.98);
    }

    .yes-button {
      transition: transform 120ms ease, filter 160ms ease;
    }

    .yes-button:hover {
      filter: brightness(1.08);
      transform: scale(1.04);
    }

    .no-button {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 62%;
      transition:
        left 130ms cubic-bezier(.16, .9, .26, 1),
        top 130ms cubic-bezier(.16, .9, .26, 1),
        transform 130ms ease;
      will-change: left, top;
    }

    .no-button.is-running {
      transform: rotate(var(--tilt, 0deg)) scale(1.04);
    }

    .caption {
      position: fixed;
      left: 50%;
      bottom: clamp(14px, 3vh, 30px);
      z-index: 30;
      transform: translateX(-50%);
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      transition: color 250ms ease, text-shadow 250ms ease;
    }

    body.love-active .caption {
      color: #ffd6f0;
      text-shadow:
        0 0 8px rgba(255, 40, 172, 0.9),
        0 0 24px rgba(255, 40, 172, 0.75),
        0 2px 16px rgba(0, 0, 0, 1);
    }

    .love-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
      opacity: 0;
      visibility: hidden;
      transform: scale(1.025);
      transition:
        opacity 260ms ease,
        transform 420ms cubic-bezier(.16, .9, .18, 1),
        visibility 0ms linear 260ms;
      pointer-events: none;
    }

    body.love-active .love-screen {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      transition-delay: 0ms;
      pointer-events: auto;
    }

    .love-wall {
      position: absolute;
      inset: -4vh -4vw;
      display: grid;
      grid-template-columns: repeat(var(--love-cols, 8), max-content);
      grid-auto-rows: max-content;
      justify-content: center;
      align-content: center;
      gap: clamp(8px, 1.2vw, 18px) clamp(12px, 1.8vw, 28px);
      transform: rotate(-2deg) scale(1.04);
    }

    .love-word {
      display: inline-block;
      color: var(--pink);
      font-size: clamp(21px, 3.15vw, 52px);
      font-weight: 900;
      line-height: 0.86;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(18px) scale(0.92);
      text-shadow:
        0 0 5px rgba(255, 30, 170, 1),
        0 0 18px rgba(255, 30, 170, 0.74),
        0 0 34px rgba(255, 20, 157, 0.48);
      animation:
        floodIn 520ms cubic-bezier(.1, .9, .2, 1) forwards,
        loveJitter 2200ms ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) + 520ms);
      user-select: none;
    }

    .love-word:nth-child(3n) {
      color: #ff63cb;
    }

    .love-word:nth-child(4n) {
      color: #f626a7;
    }

    .love-word:nth-child(7n) {
      filter: brightness(1.18);
    }

    @keyframes floodIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes loveJitter {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      30% {
        transform: translate(1px, -1px) scale(1.025);
      }
      63% {
        transform: translate(-1px, 1px) scale(0.99);
      }
    }

    .heart-wrap {
      position: relative;
      z-index: 3;
      width: clamp(180px, 27vw, 350px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.74);
      transition: opacity 320ms ease 210ms, transform 520ms cubic-bezier(.16, .9, .2, 1) 210ms;
    }

    body.love-active .heart-wrap {
      opacity: 1;
      transform: scale(1);
    }

    .heart-wrap::before,
    .heart-wrap::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 999px;
      background: rgba(255, 27, 164, 0.16);
      filter: blur(26px);
      animation: auraPulse 1500ms ease-in-out infinite;
    }

    .heart-wrap::after {
      inset: 4%;
      background: rgba(255, 255, 255, 0.09);
      filter: blur(42px);
      animation-duration: 2100ms;
    }

    .heart-svg {
      position: relative;
      z-index: 2;
      width: 84%;
      height: 84%;
      overflow: visible;
      filter:
        drop-shadow(0 0 8px rgba(255, 255, 255, 0.95))
        drop-shadow(0 0 22px rgba(255, 40, 181, 1))
        drop-shadow(0 0 55px rgba(255, 20, 157, 0.95))
        drop-shadow(0 0 105px rgba(255, 20, 157, 0.8));
      animation: heartPulse 1150ms ease-in-out infinite;
      transform-origin: 50% 55%;
    }

    .reset-button {
      position: fixed;
      right: clamp(14px, 2vw, 28px);
      bottom: clamp(14px, 2vw, 28px);
      z-index: 35;
      height: 36px;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.54);
      color: #ffe3f5;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      box-shadow: 0 0 18px rgba(255, 20, 157, 0.24);
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms ease 260ms, transform 220ms ease 260ms, background 160ms ease;
      pointer-events: none;
    }

    body.love-active .reset-button {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .reset-button:hover {
      background: rgba(255, 20, 157, 0.18);
    }

    @keyframes heartPulse {
      0%, 100% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.08);
      }
      60% {
        transform: scale(1.02);
      }
    }

    @keyframes auraPulse {
      0%, 100% {
        opacity: 0.72;
        transform: scale(0.96);
      }
      50% {
        opacity: 1;
        transform: scale(1.12);
      }
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #fff;
      pointer-events: none;
      opacity: 0;
    }

    .flash.is-on {
      animation: flashPop 280ms ease-out forwards;
    }

    @keyframes flashPop {
      0% { opacity: 0; }
      22% { opacity: 0.72; }
      100% { opacity: 0; }
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
      }

      .desktop {
        padding: 10px;
      }

      .browser-window {
        width: 100%;
        height: 82vh;
        min-height: 430px;
        border-radius: 10px;
      }

      .browser-top {
        height: 70px;
      }

      .traffic-row {
        height: 32px;
      }

      .tab {
        min-width: 142px;
        font-size: 12px;
      }

      .address-row {
        height: 38px;
        gap: 7px;
      }

      .nav-pill {
        width: 22px;
      }

      .address {
        font-size: 12px;
      }

      .browser-body {
        height: calc(100% - 70px);
        padding: 18px;
      }

      .meme-frame {
        min-height: 315px;
      }

      .question-ui {
        gap: 24px;
        transform: translateY(-18px);
      }

      .meme-button {
        min-width: 74px;
        height: 34px;
        font-size: 17px;
        padding: 4px 18px;
      }

      .love-wall {
        gap: 8px 14px;
      }

      .caption {
        width: 100%;
        padding: 0 74px 0 12px;
        font-size: 18px;
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="desktop" aria-label="macOS style browser window">
    <section class="browser-window">
      <header class="browser-top" aria-hidden="true">
        <div class="traffic-row">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="tab">Do you love me?</span>
        </div>
        <div class="address-row">
          <span class="nav-pill">&lsaquo;</span>
          <span class="nav-pill">&rsaquo;</span>
          <div class="address"><span class="lock">&#9679;</span> love-you-0e26ac.netlify.app</div>
        </div>
      </header>

      <div class="browser-body">
        <section id="memeFrame" class="meme-frame" aria-label="Do you love me question">
          <div class="question-ui">
            <h1 class="question">Do you love me?</h1>
            <div class="choices">
              <button id="yesButton" class="meme-button yes-button" type="button">Yes</button>
            </div>
          </div>
          <button id="noButton" class="meme-button no-button" type="button" aria-label="No, but it runs away">No</button>
        </section>
      </div>
    </section>
  </main>

  <section id="loveScreen" class="love-screen" aria-label="LOVE YOU screen" aria-hidden="true">
    <div id="loveWall" class="love-wall" aria-hidden="true"></div>

    <button id="heartButton" class="heart-wrap" type="button" title="Reset">
      <svg class="heart-svg" viewBox="0 0 120 110" role="img" aria-label="Glowing heart">
        <defs>
          <radialGradient id="heartGlow" cx="42%" cy="32%" r="75%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="20%" stop-color="#ffd5f0" />
            <stop offset="52%" stop-color="#ff42bd" />
            <stop offset="100%" stop-color="#ff0a93" />
          </radialGradient>
        </defs>
        <path
          d="M60 101 C35 78 10 59 10 34 C10 17 22 7 38 7 C48 7 56 13 60 22 C64 13 72 7 82 7 C98 7 110 17 110 34 C110 59 85 78 60 101 Z"
          fill="url(#heartGlow)"
          stroke="#fff6fd"
          stroke-width="3"
          stroke-linejoin="round"
        />
        <path
          d="M37 20 C28 21 21 28 21 38"
          fill="none"
          stroke="rgba(255,255,255,.74)"
          stroke-width="5"
          stroke-linecap="round"
        />
      </svg>
    </button>

    <button id="resetButton" class="reset-button" type="button">Reset</button>
  </section>

  <p class="caption">POV: yes or yes.</p>
  <div id="flash" class="flash" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const LOVE_TEXT = "LOVE YOU";
      const LOVE_DENSITY = 1.18; // Increase for more text, decrease for more breathing room.
      const FLEE_DISTANCE = 118;
      const FRAME_PADDING = 16;

      const body = document.body;
      const frame = document.getElementById("memeFrame");
      const yesButton = document.getElementById("yesButton");
      const noButton = document.getElementById("noButton");
      const loveScreen = document.getElementById("loveScreen");
      const loveWall = document.getElementById("loveWall");
      const resetButton = document.getElementById("resetButton");
      const heartButton = document.getElementById("heartButton");
      const flash = document.getElementById("flash");

      let audioContext = null;
      let noMoveTimer = 0;

      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function ensureAudioContext() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        if (!audioContext) audioContext = new AudioContext();
        return audioContext;
      }

      function playTinyClick() {
        const ctx = ensureAudioContext();
        if (!ctx) return;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(820, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(410, ctx.currentTime + 0.055);
        gain.gain.setValueAtTime(0.025, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.065);
      }

      function playLoveSound() {
        const ctx = ensureAudioContext();
        if (!ctx) return;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, ctx.currentTime);
        master.gain.exponentialRampToValueAtTime(0.055, ctx.currentTime + 0.035);
        master.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
        master.connect(ctx.destination);

        [392, 493.88, 659.25, 783.99].forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.045);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.08 + index * 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.82);
          osc.connect(gain);
          gain.connect(master);
          osc.start(ctx.currentTime + index * 0.045);
          osc.stop(ctx.currentTime + 0.95);
        });
      }

      function setNoButtonPosition(left, top) {
        noButton.style.left = `${left}px`;
        noButton.style.top = `${top}px`;
      }

      function placeNoNearYes() {
        const frameRect = frame.getBoundingClientRect();
        const yesRect = yesButton.getBoundingClientRect();
        const noRect = noButton.getBoundingClientRect();

        const left = yesRect.right - frameRect.left + 16;
        const top = yesRect.top - frameRect.top + (yesRect.height - noRect.height) / 2;

        setNoButtonPosition(
          clamp(left, FRAME_PADDING, frameRect.width - noRect.width - FRAME_PADDING),
          clamp(top, FRAME_PADDING, frameRect.height - noRect.height - FRAME_PADDING)
        );
      }

      // "No" button escape logic: when the pointer gets close, pick a new random
      // position inside the white frame. A few attempts keep it away from the cursor.
      function moveNoButton(pointerX, pointerY) {
        const frameRect = frame.getBoundingClientRect();
        const noRect = noButton.getBoundingClientRect();
        const maxLeft = frameRect.width - noRect.width - FRAME_PADDING;
        const maxTop = frameRect.height - noRect.height - FRAME_PADDING;

        let nextLeft = FRAME_PADDING;
        let nextTop = FRAME_PADDING;

        for (let i = 0; i < 18; i += 1) {
          nextLeft = randomBetween(FRAME_PADDING, maxLeft);
          nextTop = randomBetween(FRAME_PADDING, maxTop);

          const centerX = frameRect.left + nextLeft + noRect.width / 2;
          const centerY = frameRect.top + nextTop + noRect.height / 2;
          const distance = Math.hypot(centerX - pointerX, centerY - pointerY);

          if (distance > FLEE_DISTANCE * 1.25) break;
        }

        noButton.style.setProperty("--tilt", `${randomBetween(-9, 9).toFixed(1)}deg`);
        noButton.classList.add("is-running");
        setNoButtonPosition(nextLeft, nextTop);

        window.clearTimeout(noMoveTimer);
        noMoveTimer = window.setTimeout(() => noButton.classList.remove("is-running"), 150);
      }

      function handlePointerMove(event) {
        if (body.classList.contains("love-active")) return;

        const rect = noButton.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const distance = Math.hypot(event.clientX - centerX, event.clientY - centerY);

        if (distance < FLEE_DISTANCE) {
          moveNoButton(event.clientX, event.clientY);
        }
      }

      // Dynamic LOVE YOU generator. The count is based on the viewport so the
      // "flood" stays dense on laptops, desktops, and phones.
      function buildLoveWall() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const approximateCellWidth = clamp(width * 0.16, 92, 180);
        const approximateCellHeight = clamp(width * 0.055, 32, 66);
        const columns = Math.ceil((width * 1.12) / approximateCellWidth);
        const rows = Math.ceil((height * 1.14) / approximateCellHeight);
        const total = Math.ceil(columns * rows * LOVE_DENSITY);

        loveWall.innerHTML = "";
        loveWall.style.setProperty("--love-cols", columns);

        const fragment = document.createDocumentFragment();
        for (let i = 0; i < total; i += 1) {
          const span = document.createElement("span");
          span.className = "love-word";
          span.textContent = LOVE_TEXT;
          span.style.setProperty("--delay", `${Math.min(i * 18, 900)}ms`);
          fragment.appendChild(span);
        }

        loveWall.appendChild(fragment);
      }

      function flashScreen() {
        flash.classList.remove("is-on");
        void flash.offsetWidth;
        flash.classList.add("is-on");
      }

      function enterLoveMode() {
        playTinyClick();
        yesButton.style.transform = "scale(0.9)";
        window.setTimeout(() => {
          yesButton.style.transform = "";
        }, 120);

        buildLoveWall();
        playLoveSound();
        flashScreen();

        window.setTimeout(() => {
          body.classList.add("love-active");
          loveScreen.setAttribute("aria-hidden", "false");
        }, 90);
      }

      function resetMeme() {
        body.classList.remove("love-active");
        loveScreen.setAttribute("aria-hidden", "true");
        window.setTimeout(placeNoNearYes, 260);
      }

      yesButton.addEventListener("click", enterLoveMode);
      noButton.addEventListener("pointerenter", (event) => moveNoButton(event.clientX, event.clientY));
      noButton.addEventListener("click", (event) => {
        event.preventDefault();
        playTinyClick();
        moveNoButton(event.clientX || window.innerWidth / 2, event.clientY || window.innerHeight / 2);
      });
      frame.addEventListener("pointermove", handlePointerMove);
      resetButton.addEventListener("click", resetMeme);
      heartButton.addEventListener("click", resetMeme);

      window.addEventListener("resize", () => {
        if (body.classList.contains("love-active")) {
          buildLoveWall();
        } else {
          placeNoNearYes();
        }
      });

      window.addEventListener("load", placeNoNearYes);
      requestAnimationFrame(placeNoNearYes);
    })();
  </script>
</body>
</html>
